<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Old Instagram Profile (View Only)</title>
    <style>
        :root {
            --ig-blue-1: #4a86b9;
            --ig-blue-2: #2f6fa8;
            --card: #f5f5f5;
            --border: #cfcfcf;
            --text: #2b2b2b;
            --muted: #7a7a7a;
            --shadow: 0 2px 0 rgba(0, 0, 0, .08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #d9d9d9;
            color: var(--text);
        }

        .phone {
            width: min(414px, 100%);
            margin: 0 auto;
            background: #d9d9d9;
            min-height: 100vh;
            padding-bottom: 18px;
        }

        /* ====== Top bar ====== */
        .topbar {
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 10;
            color: #fff;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            background: linear-gradient(var(--ig-blue-1), var(--ig-blue-2));
            border-bottom: 1px solid rgba(0, 0, 0, .25);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .25);
        }

        .topbar .title {
            font-size: 17px;
            text-shadow: 0 -1px 0 rgba(0, 0, 0, .25);
        }

        /* 右上角：像舊版那種「…/選單」按鈕 */
        .topbar .menu {
            position: absolute;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, .35);
            background: linear-gradient(rgba(255, 255, 255, .18), rgba(0, 0, 0, .08));
            display: grid;
            place-items: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .25);
        }

        .topbar .menu:before {
            content: "⋯";
            font-size: 22px;
            line-height: 1;
            transform: translateY(-2px);
            text-shadow: 0 -1px 0 rgba(0, 0, 0, .25);
        }

        /* ====== Card ====== */
        .card {
            margin: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(#ffffff, #f0f0f0);
            box-shadow: var(--shadow);
        }

        /* ====== Stats bar ====== */
        .stats {
            display: grid;
            grid-template-columns: 92px 1fr 1fr 1fr;
            align-items: stretch;
            background: linear-gradient(#fdfdfd, #ededed);
        }

        .avatar-wrap {
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
            background: linear-gradient(#f8f8f8, #e9e9e9);
        }

        .avatar {
            width: 62px;
            height: 62px;
            border-radius: 6px;
            background:
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, .6), rgba(255, 255, 255, 0) 50%),
                #bdbdbd;
            border: 1px solid #b3b3b3;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .35);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(1) contrast(1.05);
        }

        .stat {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .stat:last-child {
            border-right: none;
        }

        .stat .num {
            font-weight: 800;
            font-size: 18px;
            padding-top: 8px;
            color: #3a3a3a;
            text-shadow: 0 1px 0 rgba(255, 255, 255, .6);
        }

        .stat .label {
            font-size: 12px;
            padding-bottom: 8px;
            color: #8b8b8b;
            text-transform: lowercase;
        }

        /* ====== Profile info ====== */
        .profile {
            padding: 12px 12px 14px;
            background: linear-gradient(#fbfbfb, #efefef);
            border-top: 1px solid var(--border);
        }

        .profile .name {
            font-weight: 800;
            font-size: 20px;
            margin: 2px 0 6px;
        }

        .profile .meta {
            color: #6f6f6f;
            font-size: 14px;
            margin: 0 0 6px;
        }

        .profile .bio {
            color: #4a4a4a;
            font-size: 14px;
            margin: 0 0 6px;
        }

        .profile .link {
            color: #2a6fb0;
            font-size: 14px;
            text-decoration: none;
            border-bottom: 1px solid rgba(42, 111, 176, .25);
        }

        /* ====== Tabs ====== */
        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: linear-gradient(#f7f7f7, #e3e3e3);
            border-top: 1px solid var(--border);
        }

        .tab {
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab.active {
            background: linear-gradient(#ffffff, #efefef);
        }

        .tab.active:after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -9px;
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid #efefef;
            filter: drop-shadow(0 -1px 0 rgba(0, 0, 0, .12));
        }

        .icon {
            width: 22px;
            height: 22px;
            opacity: .85;
            position: relative;
            filter: drop-shadow(0 1px 0 rgba(255, 255, 255, .6));
        }

        .icon.grid {
            background:
                linear-gradient(#5a5a5a, #5a5a5a) 0 0/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 8px 0/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 16px 0/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 0 8px/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 8px 8px/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 16px 8px/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 0 16px/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 8px 16px/6px 6px,
                linear-gradient(#5a5a5a, #5a5a5a) 16px 16px/6px 6px;
            background-repeat: no-repeat;
            border-radius: 3px;
        }

        .icon.list:before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 2px;
            height: 2px;
            background: #5a5a5a;
            box-shadow: 0 6px 0 #5a5a5a, 0 12px 0 #5a5a5a, 0 18px 0 #5a5a5a;
            border-radius: 2px;
        }

        .icon.pin {
            border: 2px solid #5a5a5a;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            width: 18px;
            height: 18px;
        }

        .icon.pin:after {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #5a5a5a;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .icon.user:before {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            border: 2px solid #5a5a5a;
            border-radius: 50%;
            left: 50%;
            top: 2px;
            transform: translateX(-50%);
        }

        .icon.user:after {
            content: "";
            position: absolute;
            width: 18px;
            height: 10px;
            border: 2px solid #5a5a5a;
            border-top: none;
            border-radius: 0 0 10px 10px;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
        }

        /* ====== Photo grid ====== */
        .grid {
            margin: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
            background: #fff;
        }

        .grid-inner {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: #d0d0d0;
        }

        .ph {
            aspect-ratio: 1/1;
            background:
                radial-gradient(circle at 35% 30%, rgba(255, 255, 255, .55), rgba(255, 255, 255, 0) 45%),
                linear-gradient(135deg, #b9c7d6, #8ea3b8);
            overflow: hidden;
            position: relative;
        }

        .ph img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: saturate(.9) contrast(1.05);
        }

        .ph:after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 22px rgba(0, 0, 0, .15);
            pointer-events: none;
        }
    </style>
